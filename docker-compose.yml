networks:
  caho:
    driver: bridge

services:
  redis:
    image: redis:latest
    container_name: caho-redis
    restart: always
    ports:
      - '6379:6379'
    environment:
      REDIS_PASSWORD: caho
    command: ['redis-server', '--requirepass', 'caho']
    networks:
      - caho
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'caho', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: caho-postgres
    restart: always
    environment:
      POSTGRES_USER: caho
      POSTGRES_PASSWORD: caho
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - caho
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'caho']
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: caho-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      # latest seq refuses first run without auth config; local stack opts out
      SEQ_FIRSTRUN_NOAUTHENTICATION: 'true'
    ports:
      - '5341:80'
    volumes:
      - seq_data:/data
    networks:
      - caho

  caho-api:
    container_name: caho-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./.env.docker
    environment:
      SEQ_URL: http://caho-seq:5341
      SEQ_FIRSTRUN_ADMINPASSWORD: caho
    ports:
      - '8081:8081'
    networks:
      - caho
    depends_on:
      - postgres
      - redis
      - seq

volumes:
  postgres_data:
  seq_data:
