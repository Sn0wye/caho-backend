version: '3.8'

networks:
  caho:
    driver: bridge

services:
  redis:
    image: redis:latest
    container_name: caho-redis
    restart: always
    ports:
      - '6379:6379'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: caho-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${DATABASE_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: caho-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
    ports:
      - '5341:80'
    volumes:
      - seq_data:/data
    networks:
      - caho

  caho-api:
    image: ghcr.io/sn0wye/caho-api:prod
    restart: unless-stopped
    env_file: ./caho.env
    environment:
      SEQ_URL: http://seq:5341
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8081/readyz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - '8081:8081'
    networks:
      - caho
    depends_on:
      - postgres
      - redis
      - seq

volumes:
  postgres_data:
  seq_data:
